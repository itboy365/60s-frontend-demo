<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60s 摸鱼看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .masonry-grid { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }
        .break-inside-avoid { break-inside: avoid; }

        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .quote-fade-in { animation: fadeInUp 0.6s ease-out; }

        /* 深黑色页脚样式 */
        .footer-dark {
            background-color: #0a0a0a;
            color: #ffffff;
            padding: 24px 0;
            text-align: center;
            font-size: 0.95rem;
            border-top: 1px solid #222;
        }
        .footer-dark a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer-dark a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🐟</span>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">60s 摸鱼看板</h1>
            </div>
            <div class="text-xs text-slate-500 flex items-center gap-2">
                <span id="update-time">更新中...</span>
                <span class="text-slate-300">|</span>
                <span id="auto-refresh-status" class="text-emerald-500">自动刷新中</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="status-bar" class="hidden mb-6 p-4 bg-blue-50 text-blue-700 rounded-lg border border-blue-100 text-sm"></div>
        <div class="masonry-grid" id="dashboard-container"></div>
    </main>

    <!-- 深黑色页脚 -->
    <footer class="footer-dark">
        <p>©wvip <a href="https://wvip.top" target="_blank">个人主页</a></p>
    </footer>

    <script>
        const API_BASE = '';

        const dataSources = [
            { id: 'moyu',     name: '摸鱼日报',         url: '/v2/moyu',           type: 'moyu',    icon: '🐟', color: 'bg-cyan-500', refreshable: false },
            { id: '60s',      name: '每天60秒读懂世界',  url: '/v2/60s',             type: 'news',    icon: '🌍', color: 'bg-blue-500',  refreshable: true },
            { id: 'history',  name: '历史上的今天',     url: '/v2/today-in-history',type: 'history', icon: '📅', color: 'bg-amber-500', refreshable: false },
            { id: 'oil',      name: '今日油价',         url: '/v2/fuel-price',     type: 'oil',     icon: '⛽', color: 'bg-green-600',  refreshable: true },
            { id: 'gold',     name: '实时金价',         url: '/v2/gold-price',     type: 'gold',    icon: '💰', color: 'bg-yellow-500', refreshable: true },
            { id: 'hitokoto', name: '一言',             url: '/v2/hitokoto',       type: 'quote',   icon: '💬', color: 'bg-purple-500', refreshable: false }
        ];

        let currentOilRegion = '北京';
        const abortControllers = new Map();
        const REFRESH_INTERVAL = 10 * 60 * 1000;

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getMoyuMood(weekday, daysUntilWeekend) {
            const moods = {
                '周一': () => '新的一周，摸鱼要有节奏感 ☕',
                '周二': () => '坚持一下，周末在慢慢靠近 🐌',
                '周三': () => '一周过半，小周末快乐 🎉',
                '周四': () => '马上就到周五啦，稳住 🧘',
                '周五': () => daysUntilWeekend <= 0 ? '周末在向你招手，冲！🎊' : '周五了，摸鱼进入冲刺阶段 🚀',
                '周六': () => '周末时光，好好享受 🌿',
                '周日': () => '明天又是新的一周，珍惜当下 🌅'
            };
            return (moods[weekday] || (() => '好好工作，努力摸鱼 🐟'))();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDashboard();
            startAutoRefresh();
        });

        function initDashboard() {
            updateTime();
            const container = document.getElementById('dashboard-container');
            dataSources.forEach(source => {
                const card = createSkeletonCard(source);
                container.appendChild(card);
                fetchData(source, card.id);
            });
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('update-time').textContent =
                `最后更新: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        }

        function startAutoRefresh() {
            setInterval(() => {
                dataSources.filter(s => s.refreshable).forEach(source => fetchDataSilent(source));
                updateTime();
            }, REFRESH_INTERVAL);
        }

        async function fetchDataSilent(source) {
            const card = document.getElementById(`card-${source.id}`);
            if (!card) return;
            if (abortControllers.has(source.id)) {
                abortControllers.get(source.id).abort();
                abortControllers.delete(source.id);
            }
            const controller = new AbortController();
            abortControllers.set(source.id, controller);
            const timeoutId = setTimeout(() => controller.abort(), 8000);

            try {
                const params = new URLSearchParams();
                if (source.id === 'oil') params.append('region', currentOilRegion);
                params.append('t', Date.now());
                const res = await fetch(`${API_BASE}${source.url}?${params}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!res.ok) return;
                const json = await res.json();
                const data = json.data || json;
                const cardContent = card.querySelector('.card-content');
                renderCardContent(cardContent, source.type, data);
            } catch (e) {
                clearTimeout(timeoutId);
            } finally {
                abortControllers.delete(source.id);
            }
        }

        window.refreshCard = function(sourceId) {
            const source = dataSources.find(s => s.id === sourceId);
            if (!source) return;
            const card = document.getElementById(`card-${sourceId}`);
            if (!card) return;

            const refreshBtn = card.querySelector('.refresh-btn');
            if (refreshBtn) refreshBtn.classList.add('animate-spin');

            const cardContent = card.querySelector('.card-content');
            cardContent.innerHTML = `
                <div class="animate-pulse space-y-3">
                    <div class="h-2 bg-slate-100 rounded w-3/4"></div>
                    <div class="h-2 bg-slate-100 rounded"></div>
                    <div class="h-2 bg-slate-100 rounded w-5/6"></div>
                </div>`;

            fetchData(source, card.id).finally(() => {
                if (refreshBtn) refreshBtn.classList.remove('animate-spin');
                updateTime();
            });
        };

        async function fetchData(source, cardId) {
            const card = document.getElementById(cardId);
            const cardContent = card.querySelector('.card-content');

            if (abortControllers.has(source.id)) {
                abortControllers.get(source.id).abort();
                abortControllers.delete(source.id);
            }
            const controller = new AbortController();
            abortControllers.set(source.id, controller);
            const timeoutId = setTimeout(() => controller.abort(), 8000);

            try {
                const params = new URLSearchParams();
                if (source.id === 'oil') params.append('region', currentOilRegion);
                params.append('t', Date.now());

                const response = await fetch(`${API_BASE}${source.url}?${params}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const json = await response.json();
                const data = json.data || json;
                renderCardContent(cardContent, source.type, data);
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name !== 'AbortError') {
                    cardContent.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-6 text-red-400">
                            <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                            <p class="text-xs">加载失败</p>
                            <button onclick="refreshCard('${source.id}')" class="mt-2 text-xs text-blue-500 hover:underline">重试</button>
                        </div>`;
                }
            } finally {
                abortControllers.delete(source.id);
            }
        }

        function renderCardContent(container, type, data) {
            container.innerHTML = '';
            switch (type) {
                case 'moyu':    renderMoyu(container, data);    break;
                case 'news':    renderNewsList(container, data); break;
                case 'history': renderHistory(container, data); break;
                case 'oil':     renderOil(container, data);     break;
                case 'gold':    renderGold(container, data);    break;
                case 'quote':   renderQuote(container, data);   break;
            }
        }

        function renderMoyu(container, data) {
            const date = data.date || {};
            const progress = data.progress || {};
            const nextHoliday = data.nextHoliday || { name: '未知', until: 0 };
            const nextWeekend = data.nextWeekend || { daysUntil: 0 };
            const weekday = date.weekday || '';
            const moodText = getMoyuMood(weekday, nextWeekend.daysUntil);
            const quote = data.moyuQuote || '好好工作，努力摸鱼。';

            const createProgress = (label, value) => `
                <div class="mb-2">
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-500">${escapeHtml(label)}</span>
                        <span class="font-bold text-cyan-600">${escapeHtml(String(value || 0))}%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                        <div class="bg-cyan-400 h-2 rounded-full transition-all duration-1000" style="width: ${Math.min(100, Math.max(0, value || 0))}%"></div>
                    </div>
                </div>`;

            container.innerHTML = `
                <div class="flex flex-col gap-4">
                    <div class="text-center pb-2 border-b border-cyan-100">
                        <div class="text-lg font-bold text-slate-700">${escapeHtml(date.gregorian || '')} ${escapeHtml(weekday)}</div>
                        <div class="text-xs text-slate-400 mt-1">农历${escapeHtml(date.lunar?.monthCN || '')}${escapeHtml(date.lunar?.dayCN || '')} · ${escapeHtml(date.lunar?.yearGanZhi || '')}${escapeHtml(date.lunar?.zodiac || '')}年</div>
                        <div class="mt-2 text-sm text-cyan-600 bg-cyan-50 rounded-lg px-3 py-1.5 inline-block">${escapeHtml(moodText)}</div>
                    </div>
                    <div class="bg-cyan-50/50 p-3 rounded-lg border border-cyan-100">
                        ${createProgress('本周进度', progress.week?.percentage || 0)}
                        ${createProgress('本月进度', progress.month?.percentage || 0)}
                        ${createProgress('今年进度', progress.year?.percentage || 0)}
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-orange-50 p-2 rounded-lg text-center border border-orange-100">
                            <div class="text-xs text-orange-400 mb-1">距离周末</div>
                            <div class="text-xl font-bold text-orange-500">${escapeHtml(String(nextWeekend.daysUntil))} <span class="text-xs font-normal">天</span></div>
                        </div>
                        <div class="bg-green-50 p-2 rounded-lg text-center border border-green-100">
                            <div class="text-xs text-green-400 mb-1">距离${escapeHtml(nextHoliday.name)}</div>
                            <div class="text-xl font-bold text-green-500">${escapeHtml(String(nextHoliday.until || 0))} <span class="text-xs font-normal">天</span></div>
                        </div>
                    </div>
                    <div class="relative bg-slate-50 p-3 rounded-lg text-sm text-slate-600 italic border-l-4 border-cyan-400">
                        "${escapeHtml(quote)}"
                    </div>
                </div>`;
        }

        function renderNewsList(container, data) {
            const newsList = Array.isArray(data) ? data : (data.news || []);
            if (newsList.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 text-sm py-4">暂无新闻</div>';
                return;
            }
            const ul = document.createElement('ul');
            ul.className = 'space-y-3';
            newsList.forEach(news => {
                const li = document.createElement('li');
                li.className = 'text-sm text-slate-700 leading-relaxed flex gap-2';
                li.innerHTML = `
                    <span class="text-blue-400 mt-1.5 w-1.5 h-1.5 bg-blue-400 rounded-full flex-shrink-0 block"></span>
                    <span>${escapeHtml(news)}</span>`;
                ul.appendChild(li);
            });
            container.appendChild(ul);
        }

        function renderHistory(container, data) {
            let items = [];
            let dateStr = '';
            if (data.items && Array.isArray(data.items)) {
                items = data.items;
                dateStr = data.date || '';
            } else if (Array.isArray(data)) {
                items = data;
            } else if (typeof data === 'object') {
                items = Object.entries(data).map(([year, title]) => ({ year, title }));
            }

            if (dateStr) {
                const header = document.createElement('div');
                header.className = 'mb-3 font-bold text-amber-600 text-sm';
                header.innerHTML = `<span class="bg-amber-100 px-2 py-0.5 rounded text-amber-700 text-xs">📅 ${escapeHtml(dateStr)}</span>`;
                container.appendChild(header);
            }

            if (items.length === 0) {
                const p = document.createElement('p');
                p.className = 'text-slate-400 text-sm py-2';
                p.textContent = '暂无历史记录';
                container.appendChild(p);
                return;
            }

            const ul = document.createElement('ul');
            ul.className = 'space-y-3 relative border-l border-amber-200 ml-2 pl-4 py-1';
            items.slice(0, 10).forEach(item => {
                const year = parseInt(item.year || item.date || 0);
                const title = item.title || item.event || item;
                const link = item.link || null;
                const type = item.event_type || 'event';
                const desc = item.description || '';
                let typeIcon = type === 'birth' ? '👶' : (type === 'death' ? '🪦' : '');

                let yearColorClass = 'text-slate-500 bg-slate-100';
                if (year < 1900) yearColorClass = 'text-amber-800 bg-amber-100';
                else if (year < 2000) yearColorClass = 'text-orange-700 bg-orange-100';

                const safeTitle = typeof title === 'string' ? title : (title.title || JSON.stringify(title));
                const titleHtml = link
                    ? `<a href="${escapeHtml(link)}" target="_blank" class="text-slate-700 leading-tight block hover:text-amber-700 transition-colors line-clamp-2" title="${escapeHtml(desc)}">${escapeHtml(safeTitle)}</a>`
                    : `<span class="text-slate-700 leading-tight block line-clamp-2" title="${escapeHtml(desc)}">${escapeHtml(safeTitle)}</span>`;

                const li = document.createElement('li');
                li.className = 'text-sm relative group';
                li.innerHTML = `
                    <span class="absolute -left-[21px] top-1.5 w-2.5 h-2.5 bg-amber-400 rounded-full ring-4 ring-white"></span>
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2 mb-0.5">
                            <span class="font-mono font-bold text-xs px-1 rounded ${yearColorClass}">${escapeHtml(String(year || '未知'))}</span>
                            ${typeIcon ? `<span class="text-xs">${typeIcon}</span>` : ''}
                        </div>
                        ${titleHtml}
                    </div>`;
                ul.appendChild(li);
            });
            container.appendChild(ul);
        }

        function renderOil(container, data) {
            const region = data.region || currentOilRegion;
            const items = data.items || [];
            const updateTime = data.updated ? data.updated.split(' ')[0] : '';

            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col gap-3';

            const header = document.createElement('div');
            header.className = 'flex justify-between items-end border-b border-green-100 pb-2';
            header.innerHTML = `
                <div class="oil-city-btn flex items-center gap-1 text-green-700 font-bold cursor-pointer hover:text-green-900 transition-colors group" title="点击切换城市">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span class="underline decoration-dotted underline-offset-4 decoration-green-400 group-hover:decoration-green-700">${escapeHtml(region)}</span>
                    <svg class="w-3 h-3 ml-0.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
                <span class="text-[10px] text-slate-400">${escapeHtml(updateTime)}</span>`;
            header.querySelector('.oil-city-btn').onclick = (e) => {
                e.stopPropagation();
                showCityInput(wrapper, region);
            };
            wrapper.appendChild(header);

            if (items.length === 0) {
                const p = document.createElement('p');
                p.className = 'text-slate-400 text-sm py-4 text-center';
                p.textContent = '暂无油价数据';
                wrapper.appendChild(p);
            } else {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-3 mt-1';
                items.forEach(item => {
                    const name = item.name || '';
                    const isStar = name.includes('92') || name.includes('95');
                    const shortName = name.replace('汽油', '').replace('柴油', '');
                    const el = document.createElement('div');
                    el.className = `rounded-lg p-3 text-center border transition-colors ${isStar ? 'bg-yellow-50 border-yellow-200' : 'bg-green-50/50 border-green-100/50 hover:bg-green-50'}`;
                    el.innerHTML = `
                        <div class="text-xs text-slate-500 mb-1 flex items-center justify-center gap-0.5">
                            ${isStar ? '<span class="text-yellow-500">⭐</span>' : ''}
                            ${escapeHtml(shortName)}
                        </div>
                        <div class="text-lg font-bold text-green-700">${escapeHtml(item.price)}</div>
                        <div class="text-[10px] text-slate-400 transform scale-90">元/升</div>`;
                    grid.appendChild(el);
                });
                wrapper.appendChild(grid);
            }
            container.appendChild(wrapper);
        }

        function showCityInput(wrapper, currentCity) {
            const header = wrapper.querySelector('div:first-child');
            if (!header) return;
            header.innerHTML = `
                <div class="flex items-center gap-2 w-full">
                    <input type="text" id="oil-city-input" class="flex-1 border border-green-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-green-400" value="${escapeHtml(currentCity)}" placeholder="输入城市">
                    <button id="oil-city-confirm" class="px-2 py-1 bg-green-500 text-white text-xs rounded hover:bg-green-600">确定</button>
                    <button id="oil-city-cancel" class="px-2 py-1 bg-slate-200 text-slate-600 text-xs rounded hover:bg-slate-300">取消</button>
                </div>`;
            header.querySelector('#oil-city-confirm').onclick = () => {
                const input = document.getElementById('oil-city-input');
                if (input && input.value.trim()) {
                    currentOilRegion = input.value.trim();
                    refreshCard('oil');
                }
            };
            header.querySelector('#oil-city-cancel').onclick = () => refreshCard('oil');
            document.getElementById('oil-city-input')?.focus();
        }

        function renderGold(container, data) {
            const wrapper = document.createElement('div');
            wrapper.className = 'space-y-3';

            if (data.metals && Array.isArray(data.metals) && data.metals.length > 0) {
                const section = document.createElement('div');
                const title = document.createElement('h3');
                title.className = 'text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider';
                title.textContent = '基础行情';
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-2';
                data.metals.slice(0, 6).forEach(metal => {
                    const change = metal.change || metal.change_amount || '';
                    const changeClass = change.includes('+') ? 'text-red-500' : (change.includes('-') ? 'text-green-500' : 'text-slate-400');
                    const arrow = change.includes('+') ? '↑' : (change.includes('-') ? '↓' : '');

                    const el = document.createElement('div');
                    el.className = 'bg-yellow-50/50 p-2 rounded border border-yellow-100 flex flex-col items-center';
                    el.innerHTML = `
                        <span class="text-xs text-slate-500">${escapeHtml(metal.name || '')}</span>
                        <span class="font-bold text-slate-800">${escapeHtml(metal.today_price || '')}</span>
                        ${change ? `<span class="text-[10px] ${changeClass}">${arrow} ${escapeHtml(change)}</span>` : ''}`;
                    grid.appendChild(el);
                });
                section.appendChild(grid);

                const unitNote = document.createElement('p');
                unitNote.className = 'text-[10px] text-slate-400 mt-1';
                unitNote.textContent = '* 国内金价单位为元/克，国际金价单位为美元/盎司';
                section.appendChild(unitNote);

                wrapper.appendChild(section);
            } else {
                const p = document.createElement('p');
                p.className = 'text-slate-400 text-sm py-4 text-center';
                p.textContent = '暂无金价数据';
                wrapper.appendChild(p);
            }
            container.appendChild(wrapper);
        }

        function renderQuote(container, data) {
            const text = data.hitokoto || data.text || '生活不止眼前的苟且，还有诗和远方。';
            const from = data.from || '佚名';
            container.innerHTML = `
                <div class="text-center py-4 relative group cursor-default quote-fade-in">
                    <span class="text-6xl text-purple-100 absolute top-0 left-0 -translate-y-2 font-serif select-none">"</span>
                    <p class="text-lg text-slate-700 font-medium italic relative z-10 my-2 px-2">${escapeHtml(text)}</p>
                    <div class="text-xs text-right text-slate-400 mt-2 pr-2">—— ${escapeHtml(from)}</div>
                </div>`;
        }

        function createSkeletonCard(source) {
            const div = document.createElement('div');
            div.className = 'bg-white rounded-xl shadow-sm border border-slate-200 mb-6 overflow-hidden break-inside-avoid transition-all hover:shadow-md';
            div.id = `card-${source.id}`;
            div.innerHTML = `
                <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-white">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg ${source.color} text-white flex items-center justify-center text-sm shadow-sm">${source.icon}</div>
                        <h2 class="font-bold text-slate-800">${escapeHtml(source.name)}</h2>
                    </div>
                    <button class="refresh-btn p-1.5 text-slate-400 hover:text-blue-500 hover:bg-slate-50 rounded-full transition-all min-w-[32px] min-h-[32px] flex items-center justify-center"
                            onclick="refreshCard('${source.id}')" title="刷新此卡片">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>
                <div class="card-content p-5 min-h-[100px]">
                    <div class="animate-pulse space-y-3">
                        <div class="h-2 bg-slate-100 rounded w-3/4"></div>
                        <div class="h-2 bg-slate-100 rounded"></div>
                        <div class="h-2 bg-slate-100 rounded w-5/6"></div>
                    </div>
                </div>`;
            return div;
        }
    </script>
</body>
